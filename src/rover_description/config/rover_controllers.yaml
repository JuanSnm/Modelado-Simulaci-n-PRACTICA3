controller_manager:
  ros__parameters:
    update_rate: 50

    rover_base_control:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

rover_base_control:
  ros__parameters:
    use_stamped_vel: true
    use_sim_time: true
    publish_rate: 50.0

    # OJO: en tu robot las ruedas con Y positiva son las de la izquierda
    left_wheel_names: ["wheelB_1_link_joint", "wheelB_2_link_joint", "wheelB_3_link_joint"]
    right_wheel_names: ["wheelA_1_link_joint", "wheelA_2_link_joint", "wheelA_3_link_joint"]

    wheels_per_side: 3

    wheel_separation: 2.65674
    wheel_radius: 0.30

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    base_frame_id: base_footprint
    odom_frame_id: odom
    enable_odom_tf: true
    open_loop: false
    position_feedback: true
    publish_limited_velocity: true
    cmd_vel_timeout: 0.5

    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 4.0
    linear.x.has_acceleration_limits: true
    linear.x.max_acceleration: 4.0

    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 1.2
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration: 1.2

joint_state_broadcaster:
  ros__parameters: {}